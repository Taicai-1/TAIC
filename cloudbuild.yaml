steps:
  # Build Backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/applydi/applydi-backend', './backend']

  # Push Backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/applydi/applydi-backend']

  # Deploy Backend
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'applydi-backend'
      - '--image'
      - 'gcr.io/applydi/applydi-backend'
      - '--platform'
      - 'managed'
      - '--region'
      - 'europe-west1'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '300'
      - '--service-account'
      - 'taic-drive-sa@applydi.iam.gserviceaccount.com'
      - '--vpc-connector'
      - 'redis-connector'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=applydi,ENVIRONMENT=production,GCS_BUCKET_NAME=applydi-documents,GEMINI_MODEL=gemini:gemini-2.0-flash-001,GEMINI_DEFAULT_MODEL=gemini-2.0-flash-001,GEMINI_LOCATION=europe-west1,OPENAI_MODEL=gpt-4.1,OPENAI_MAX_TOKENS=32768,ALLOWED_ORIGINS=https://taic.ai,REDIS_HOST=10.170.82.115,REDIS_PORT=6379,FRONTEND_URL=https://taic.ai,BACKEND_PUBLIC_URL=https://applydi-backend-817946451913.europe-west1.run.app'
      - '--set-secrets'
      - 'OPENAI_API_KEY=OPENAI_API_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,MISTRAL_API_KEY=MISTRAL_API_KEY:latest,PERPLEXITY_API_KEY=PERPLEXITY_API_KEY:latest,DATABASE_URL=DATABASE_URL_DEV:latest,JWT_SECRET_KEY=JWT_SECRET_KEY:latest,EMAIL_INGEST_API_KEY=EMAIL_INGEST_API_KEY:1,SMTP_EMAIL=SMTP_EMAIL:latest,SMTP_PASSWORD=SMTP_PASSWORD:latest,ENCRYPTION_KEY=ENCRYPTION_KEY:latest,NEO4J_URI=NEO4J_URI:latest,NEO4J_USER=NEO4J_USER:latest,NEO4J_PASSWORD=NEO4J_PASSWORD:latest,WEEKLY_RECAP_API_KEY=WEEKLY_RECAP_API_KEY:latest,NOTION_API_KEY=NOTION_API_KEY:latest,GOOGLE_OAUTH_CLIENT_ID=GOOGLE_OAUTH_CLIENT_ID:latest'

  # Get Backend URL
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        BACKEND_URL=$$(gcloud run services describe applydi-backend --region=europe-west1 --format="value(status.url)")
        echo "Backend URL: $$BACKEND_URL"
        echo "$$BACKEND_URL" > /workspace/backend_url.txt

  # Build Frontend with Backend URL as build-arg
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - '-c'
      - |
        BACKEND_URL=$$(cat /workspace/backend_url.txt)
        docker build --build-arg NEXT_PUBLIC_API_URL=$$BACKEND_URL --build-arg NEXT_PUBLIC_GA_ID=${_GA_ID} --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID} -t gcr.io/applydi/applydi-frontend ./frontend

  # Push Frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/applydi/applydi-frontend']

  # Deploy Frontend
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        BACKEND_URL=$$(cat /workspace/backend_url.txt)
        gcloud run deploy applydi-frontend \
          --image=gcr.io/applydi/applydi-frontend \
          --platform=managed \
          --region=europe-west1 \
          --allow-unauthenticated \
          --port=3000 \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=5 \
          --set-env-vars=NEXT_PUBLIC_API_URL=$$BACKEND_URL,NEXT_PUBLIC_GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID}

images:
  - 'gcr.io/applydi/applydi-backend'
  - 'gcr.io/applydi/applydi-frontend'

substitutions:
  _GA_ID: 'G-SMFNXHZW68'
  _GOOGLE_CLIENT_ID: '817946451913-bn9a7q6f61eimoirof9spquo0bk23k5p.apps.googleusercontent.com'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: 1800s